# Cosmic Horror Index — NLP Pipeline Configuration

# === MODEL SETTINGS ===
embedding_model: "all-MiniLM-L6-v2"          # SentenceTransformer model for semantic search
embedding_dim: 384
classification_model: "claude-sonnet-4-20250514"  # For passage classification
max_tokens_per_classification: 500
faiss_index_type: "IndexFlatIP"               # Inner product (cosine sim on normalized vectors)
top_k_retrieval: 20                           # Passages retrieved per axis per tradition
min_relevance_threshold: 0.3                  # Below this, passage is discarded

# === CHUNK SETTINGS ===
chunk_strategy:
  verse_texts: "verse"          # Upanishads, Pali Canon, Dao De Jing, Eddas, Theogony
  prose_texts: "paragraph"      # Lovecraft, commentaries, scholarship
  max_chunk_tokens: 256         # Roughly 1-3 verses or 1 paragraph
  overlap_tokens: 32            # Sliding window overlap for prose

